apiVersion: apps/v1
kind: Deployment
metadata:
  name: firmware-service
  namespace: firmware
  labels: { app: firmware-service }
spec:
  replicas: 1
  selector:
    matchLabels: { app: firmware-service }
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxUnavailable: 0, maxSurge: 1 }
  template:
    metadata:
      labels: { app: firmware-service }
    spec:
      containers:
        - name: firmware-service
          # Image tag = git short-sha of the repo commit the image was built from (immutable).
          # Keep FIRMWARE_TAG in firmware-service-env in lockstep — it keys the MinIO
          # build cache; a stale tag serves a stale cached binary on POST /v1/build.
          image: fahim0173/rak3112-firmware-service:b60ea9d
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 8000 }
          envFrom:
            - secretRef: { name: firmware-service-env }
          # tcpSocket probe: /v1/sensors is bearer-guarded — httpGet would 401.
          # Plan 05 can add an unauthenticated /healthz to switch to httpGet.
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "200m", memory: "256Mi" }
