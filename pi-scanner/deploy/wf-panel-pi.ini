; Reference ~/.config/wf-panel-pi.ini for the Careflow kiosk (Raspberry Pi OS bookworm / wf-panel-pi).
; autohide keeps the desktop taskbar out of the kiosk; it slides back when you exit to the desktop.
[panel]
autohide=true
autohide_duration=300
launcher_000001=lxde-x-www-browser.desktop
launcher_000002=pcmanfm.desktop
launcher_000003=lxterminal.desktop
