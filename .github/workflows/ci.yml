name: CI

on:
  push:
    branches: [main, "phase/**", "feat/**", "fix/**"]
  pull_request:
    branches: [main]

jobs:
  pre-commit:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install LLVM 18 (clang-format) + pre-commit
        run: |
          brew install llvm@18
          pipx install pre-commit
          echo "/opt/homebrew/opt/llvm@18/bin" >> "$GITHUB_PATH"
      - name: Run pre-commit
        run: pre-commit run --all-files

  idf-build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      # Fetch the private shared LoRaWAN component into firmware/components/ so it's a LOCAL component
      # (takes precedence over the git: managed dependency in main/idf_component.yml) — avoids needing
      # git auth inside the esp-idf-ci-action container. Requires the COMPONENT_REPO_TOKEN secret
      # (fine-grained PAT, read-only Contents on rnd-southerniot/siot-lorawan-node).
      - name: Fetch private shared component (siot-lorawan-node)
        uses: actions/checkout@v4
        with:
          repository: rnd-southerniot/siot-lorawan-node
          ref: v0.1.0
          token: ${{ secrets.COMPONENT_REPO_TOKEN }}
          path: firmware/components/siot-lorawan-node
      - name: Build with ESP-IDF v5.5.4 (pristine)
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5.4
          target: esp32s3
          path: firmware

  gitleaks:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks v8.30.1
        run: |
          curl -fsSL -o /tmp/gitleaks.tgz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          sudo tar -xzf /tmp/gitleaks.tgz -C /usr/local/bin gitleaks
      - name: Scan
        run: gitleaks detect --no-banner --redact

  host-tests:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build
      - name: Configure, build and run host ctest
        run: |
          cmake -S tests/host -B tests/host/build -G Ninja
          cmake --build tests/host/build
          ctest --test-dir tests/host/build --output-on-failure

  device-profiles:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate profiles + enforce generated-catalog freshness
        run: |
          python -m pip install --quiet jsonschema
          python device-profiles/validate_profiles.py
          # Fail if the top-level CRM catalog (what the API serves) has drifted from profiles/.
          python device-profiles/profiles_to_catalog.py --check

  api-tests:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install API + test deps (pinned)
        run: python -m pip install --quiet -r requirements.txt -r requirements-dev.txt
      - name: Run CRM firmware-service test suite
        run: python -m pytest tests/unit tests/integration -q
