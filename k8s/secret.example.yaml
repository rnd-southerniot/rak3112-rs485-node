# Keys only — real values applied separately, NEVER committed.
# Build on-cluster:  kubectl create secret generic firmware-service-env -n firmware \
#     --from-env-file=firmware-service.clusterenv
# MinIO key length constraint: ACCESS_KEY 8-40 chars, SECRET_KEY 8-40 chars.
apiVersion: v1
kind: Secret
metadata:
  name: firmware-service-env
  namespace: firmware
type: Opaque
stringData:
  API_TOKEN: "<generate: openssl rand -hex 32>"
  MINIO_INTERNAL_ENDPOINT: "minio.storage.svc.cluster.local:80"
  MINIO_EXTERNAL_ENDPOINT: "10.10.8.171:30900"
  MINIO_ACCESS_KEY: "<20-char hex: openssl rand -hex 10>"
  MINIO_SECRET_KEY: "<40-char hex: openssl rand -hex 20>"
  MINIO_BUCKET: "firmware-artifacts"
  FIRMWARE_TAG: "phase-7-provisioning-green"
